<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESENCIAL | Zona de Juegos</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --color-P: #27ae60; --color-A: #e74c3c; --color-AC: #3498db; --bg: #f4f9f9; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #2c3e50; }
        .view { display: none; max-width: 900px; margin: auto; }
        .active { display: block; }
        
        /* Estilos fluidos */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        .p-card { background: white; padding: 15px; border-radius: 30px; border: 6px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 8px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .p-card:hover { transform: scale(1.03); border-color: var(--color-AC); }
        .p-card img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; }

        .juego-container { background: white; padding: 40px; border-radius: 40px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-game { padding: 20px 30px; border-radius: 25px; border: none; font-size: 1.1rem; font-weight: 900; margin: 10px; cursor: pointer; transition: 0.3s; color: white; }
        
        /* Animaciones */
        @keyframes sway { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
        .sway { animation: sway 0.3s ease-in-out infinite; }
    </style>
</head>
<body>

<div id="view-selector" class="view active">
    <h1 style="text-align:center;">🎮 Zona de Juegos</h1>
    
    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: white; padding: 20px; border-radius: 25px;">
        <select id="sel-mod" onchange="adaptarSelectores()" style="padding:15px; border-radius:15px; font-size:1.1rem;">
            <option value="cd">Centro de Día (CD)</option>
            <option value="cet">Educativo (CET)</option>
            <option value="rehab">Rehabilitación</option>
        </select>
        <div id="container-sala">
            <select id="sel-sala" onchange="cargarDatos()" style="padding:15px; border-radius:15px; font-size:1.1rem;">
                <option value="1">Sala 1</option><option value="2">Sala 2</option>
                <option value="3">Sala 3</option><option value="4">Sala 4</option>
            </select>
        </div>
        <select id="sel-turno" onchange="cargarDatos()" style="padding:15px; border-radius:15px; font-size:1.1rem;"></select>
    </div>

    <div class="grid" id="grilla"></div>
    <br>
    <button onclick="window.location.href='index.html'" style="width:100%; padding:20px; border-radius:20px; border:none; background:#95a5a6; color:white; font-weight:bold;">⬅ Volver a Asistencia</button>
</div>

<div id="view-juego" class="view">
    <div class="juego-container">
        <h2 id="titulo-juego"></h2>
        <div id="pantalla-juego" style="min-height: 350px; display:flex; align-items:center; justify-content:center; flex-direction:column;"></div>
        <br>
        <button onclick="irA('selector')" class="btn-game" style="background:#bdc3c7;">⬅ Cambiar de compañero</button>
    </div>
</div>
<script>
// 1. Inicialización de Firebase
const firebaseConfig = {
    apiKey: "AIzaSyAugXXx_b_wKFByhDbLZslk2HA_UTzrzd8",
    authDomain: "clinicaintegral-5c488.firebaseapp.com",
    databaseURL: "https://clinicaintegral-5c488-default-rtdb.firebaseio.com",
    projectId: "clinicaintegral-5c488"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const baseFotoPath = "https://raw.githubusercontent.com/cristianmarquezcpn-web/asistencia_concurrentes/main/fotos_concurrentes/";

// 2. Variable global
window.listaPacientes = [];

// 3. Cargar al iniciar
const config = JSON.parse(localStorage.getItem('configJuego'));
if(config) {
    let ruta = (config.mod === 'rehab') ? 'rehab/turnos/Lunes' : `${config.mod}/pacientes`;
    db.ref(ruta).once('value').then(snap => {
        const data = snap.val();
        if (data) {
            window.listaPacientes = (config.mod !== 'rehab') 
                ? Object.keys(data).filter(n => String(data[n].sala) === config.sala)
                : Object.values(data);
        }
    });
}

// 4. Navegación
function irA(v) {
    document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
    const target = document.getElementById('view-' + v);
    if (target) target.classList.add('active');
}

// 5. Lógica de Juegos
function menuJuegos(n, u) {
    document.getElementById('titulo-juego').innerText = "Jugando con " + n;
    document.getElementById('pantalla-juego').innerHTML = `
        <button class="btn-game" style="background:var(--color-AC);" onclick="juegoAnimales('${u}')">🐶 Animales</button>
        <button class="btn-game" style="background:var(--color-P);" onclick="juegoPintar('${u}')">🎨 Pintar</button>
        <button class="btn-game" style="background:#f39c12;" onclick="juegoRompecabezas('${u}')">🧩 Rompecabezas</button>
        <button class="btn-game" style="background:var(--color-AC);" onclick="juegoMemoria('${n}')">🧠 ¿Quién es?</button>
        <button class="btn-game" style="background:#2ecc71;" onclick="juegoLightBox('${u}')">✨ Light Box</button>
        <button class="btn-game" style="background:#3498db;" onclick="juegoSimon('${u}')">🎹 Simón Dice</button>
    `;
    irA('juego');
}

function juegoMemoria(nombreActual) {
    let opciones = [nombreActual];
    while(opciones.length < 3) {
        let azar = window.listaPacientes[Math.floor(Math.random() * window.listaPacientes.length)];
        if(!opciones.includes(azar)) opciones.push(azar);
    }
    opciones.sort(() => Math.random() - 0.5);

    let html = `<h3 style="margin-bottom:20px;">¿A quién buscamos?</h3>
                <img src="${baseFotoPath}${encodeURIComponent(nombreActual)}.jpg" style="width:120px; height:120px; border-radius:50%; border:6px solid var(--color-AC); margin-bottom:20px;">
                <div style="display:flex; justify-content:center; gap:15px;">`;
    opciones.forEach(n => {
        html += `<img src="${baseFotoPath}${encodeURIComponent(n)}.jpg" style="width:100px; height:100px; border-radius:20px; cursor:pointer; border:4px solid #ddd;" onclick="verificarMemoria('${n}', '${nombreActual}')">`;
    });
    document.getElementById('pantalla-juego').innerHTML = html + `</div>`;
}

function verificarMemoria(sel, obj) {
    if(sel === obj) {
        confetti({ particleCount: 100, spread: 70 });
        registrarProgreso(obj, "Memoria", "Victoria");
    } else {
        alert("¡Intenta de nuevo!");
        registrarProgreso(obj, "Memoria", "Error");
    }
}

function registrarProgreso(nombre, juego, res) {
    const fecha = new Date().toISOString().split('T')[0];
    db.ref(`seguimiento_pacientes/${nombre}/actividad_cognitiva/${fecha}`).push({
        juego: juego,
        resultado: res,
        timestamp: firebase.database.ServerValue.TIMESTAMP
    });
}
function adaptarSelectores() {
    const mod = document.getElementById('sel-mod').value;
    const selTurno = document.getElementById('sel-turno');
    const containerSala = document.getElementById('container-sala');
    
    // 1. Manejo de la Sala: Solo se oculta en Rehab
    containerSala.style.display = (mod === 'rehab') ? 'none' : 'block';

    // 2. Manejo del Turno: SIEMPRE visible, pero con opciones distintas según el modo
    selTurno.style.display = 'block'; 
    selTurno.innerHTML = '';
    
    const opts = (mod === 'rehab') 
        ? ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'] 
        : ['manana', 'tarde', 'vespertino'];

    opts.forEach(op => {
        const label = (mod === 'rehab') ? op : op.charAt(0).toUpperCase() + op.slice(1);
        selTurno.innerHTML += `<option value="${op}">${label}</option>`;
    });
    
    // 3. Cargamos los datos inmediatamente
    cargarDatos();
}

    async function cargarDatos() {
    const mod = document.getElementById('sel-mod').value;
    const sala = document.getElementById('sel-sala').value;
    const turno = document.getElementById('sel-turno').value;
    const grid = document.getElementById('grilla');

    // Si no hay turno seleccionado, salimos pero limpiamos la grilla
    if (!turno) { grid.innerHTML = ''; return; }

    grid.innerHTML = '<h2>Buscando pacientes... 🕵️‍♂️</h2>';
    
    // Ruta: Rehab busca por turno (Lunes, Martes...), CD/CET busca en la base general de pacientes
    let refPath = (mod === 'rehab') ? `rehab/turnos/${turno}` : `${mod}/pacientes`;
    
    try {
        const snap = await db.ref(refPath).once('value');
        const todos = snap.val();
        
        if(!todos) {
            grid.innerHTML = `<h2>No hay pacientes registrados aquí. 🤷‍♂️</h2>`;
            return;
        }

        grid.innerHTML = '';
        let encontrados = 0;
        let procesados = {}; 
        window.listaPacientes = []; // Actualizamos la lista global para los juegos

        for (let key in todos) {
            let nombre = (mod === 'rehab') ? todos[key] : key;
            
            if (procesados[nombre]) continue; 
            
            // Para CD y CET, 'todos[key]' es el objeto que contiene sala y turno
            // Para Rehab, no hay objeto, solo el nombre, así que creamos un objeto temporal
            let p = (mod === 'rehab') ? { turno: turno } : todos[key];
            
            // Lógica unificada:
            // Rehab ignora sala. CD y CET validan que sala y turno coincidan.
            const coincide = (mod === 'rehab') ? true : (String(p.sala) === sala && p.turno === turno);

            if (coincide) {
                procesados[nombre] = true;
                encontrados++;
                window.listaPacientes.push(nombre); // Guardamos para el juego
                
                const fotoUrl = `${baseFotoPath}${encodeURIComponent(nombre)}.jpg`;
                
                grid.innerHTML += `
                    <div class="p-card" onclick="menuJuegos('${nombre}', '${fotoUrl}')">
                        <img src="${fotoUrl}" onerror="this.src='https://via.placeholder.com/110'">
                        <p>${nombre}</p>
                    </div>`;
            }
        }

        if(encontrados === 0) grid.innerHTML = '<h2>No hay pacientes en esta sala/turno. 🤷‍♂️</h2>';

    } catch (e) {
        console.error(e);
        grid.innerHTML = '<h2>Error conectando a la base de datos.</h2>';
    }
}
  function juegoRompecabezas(u) {
    document.getElementById('pantalla-juego').innerHTML = `
        <h3 style="margin-bottom:15px;">¡Armemos la imagen!</h3>
        <div id="puzzle-container" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; width:260px; margin:auto;"></div>
    `;

    const container = document.getElementById('puzzle-container');
    const piezas = [
        {pos: '0% 0%'}, {pos: '100% 0%'},
        {pos: '0% 100%'}, {pos: '100% 100%'}
    ];

    piezas.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'puzzle-piece';
        div.style.cssText = `
            width:120px; height:120px; background-image:url(${u}); 
            background-size:200% 200%; background-position:${p.pos};
            border-radius:15px; cursor:pointer; border:4px solid #ddd;
            transition:0.5s; opacity:0.6;
        `;
        
        div.onclick = function() {
            this.style.opacity = '1';
            this.style.border = '4px solid var(--secondary)';
            this.style.transform = 'scale(1.05)';
            // Sonido de pieza encajando
            new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3').play();
            
            // Verificación simple de victoria
            if(document.querySelectorAll('.puzzle-piece[style*="opacity: 1"]').length === 4) {
                setTimeout(() => confetti({ particleCount: 150, spread: 100 }), 500);
            }
        };
        container.appendChild(div);
    });
}
  function juegoAnimales(foto) {
    // Definimos los animales en una lista para que sea fácil agregar más
    const animales = [
        {emoji: '🐮', id: 'vaca'},
        {emoji: '🐱', id: 'gato'},
        {emoji: '🐶', id: 'perro'},
        {emoji: '🐴', id: 'caballo'},
        {emoji: '🦆', id: 'pato'}
    ];

    let botonesHtml = '';
    animales.forEach(a => {
        botonesHtml += `
            <button onclick="sonar('${a.id}')" style="font-size:3rem; border:none; background:none; cursor:pointer; transition:0.2s; margin:5px;">
                ${a.emoji}
            </button>`;
    });

    document.getElementById('pantalla-juego').innerHTML = `
        <img id="img-sway" src="${foto}" style="width:160px; height:160px; border-radius:50%; border:8px solid var(--color-AC); object-fit:cover;">
        <div style="margin-top:20px; display:flex; flex-wrap:wrap; justify-content:center;">
            ${botonesHtml}
        </div>`;
}

    function sonar(a) {
        const i = document.getElementById('img-sway');
        i.classList.add('sway');
        new Audio(`https://raw.githubusercontent.com/cristianmarquezcpn-web/asistencia_concurrentes/main/sonidos_animales/${a}.mp3`).play();
        setTimeout(() => i.classList.remove('sway'), 1500);
    }

 function juegoPintar(foto) {
    document.getElementById('pantalla-juego').innerHTML = `
        <h3 style="margin-bottom:10px;">¡Dale color a la foto!</h3>
        <div id="canvas-container" style="position:relative; width:180px; height:180px; margin:auto;">
            <img src="${foto}" id="img-base" style="width:180px; height:180px; border-radius:30px; filter:grayscale(100%); transition:0.5s; object-fit:cover; border: 5px solid #ccc;">
        </div>
        <div id="paleta" style="margin-top:20px; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;"></div>
    `;

    const colores = ['#e74c3c', '#f1c40f', '#27ae60', '#3498db', '#9b59b6'];
    const paleta = document.getElementById('paleta');

    colores.forEach(c => {
        const btn = document.createElement('button');
        btn.style.cssText = `width:50px; height:50px; border-radius:50%; border:3px solid white; background:${c}; cursor:pointer; box-shadow:0 2px 5px rgba(0,0,0,0.2);`;
        
        btn.onclick = function() {
            const img = document.getElementById('img-base');
            // Aplicamos el color directo al borde y quitamos el gris
            img.style.filter = 'grayscale(0%)';
            img.style.borderColor = c; 
            new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3').play();
        };
        paleta.appendChild(btn);
    });
}
    function juegoLightBox(u) {
    document.getElementById('pantalla-juego').innerHTML = `
        <div id="canvas-sensorial" style="width:100%; height:400px; background:#2c3e50; border-radius:15px; cursor:pointer;"></div>
    `;
    
    const canvas = document.getElementById('canvas-sensorial');
    canvas.onclick = () => {
        // Colores suaves
        const colores = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#1A535C', '#F7FFF7'];
        const color = colores[Math.floor(Math.random() * colores.length)];
        canvas.style.backgroundColor = color;
        
        // Sonido suave (usando un oscilador)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        osc.type = 'sine'; // Tono suave
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5); // Duración corta
        
        // Vibración (si el dispositivo es móvil)
        if (navigator.vibrate) navigator.vibrate(100);
    };
    }
    function juegoSimon(u) {
    let secuencia = [];
    let pasoUsuario = 0;
    let dificultad = 2; // Default: 2 pasos para empezar

    document.getElementById('pantalla-juego').innerHTML = `
        <div id="controles-simon" style="margin-bottom:10px;">
            <button onclick="cambiarDificultad(2)">Fácil (2)</button>
            <button onclick="cambiarDificultad(4)">Medio (4)</button>
            <button onclick="cambiarDificultad(6)">Reto (6)</button>
        </div>
        <h3 id="status-text">Elige nivel y observa...</h3>
        <div id="simon-container" style="display:flex; justify-content:center; gap:20px;">
            <button id="btn-1" style="width:100px; height:100px; border-radius:50%; background:#bdc3c7; border:none;"></button>
            <button id="btn-2" style="width:100px; height:100px; border-radius:50%; background:#bdc3c7; border:none;"></button>
        </div>
    `;

    window.cambiarDificultad = (nivel) => {
        dificultad = nivel;
        secuencia = [];
        document.getElementById('status-text').innerText = "Dificultad: " + nivel + " pasos. Iniciando...";
        mostrarSecuencia();
    };

    async function iluminar(id, color) {
        const btn = document.getElementById('btn-' + id);
        btn.style.background = color;
        await new Promise(r => setTimeout(r, 600));
        btn.style.background = '#bdc3c7';
    }

    async function mostrarSecuencia() {
        secuencia = []; // Limpiamos para empezar serie nueva
        for(let i=0; i < dificultad; i++) {
            secuencia.push(Math.floor(Math.random() * 2) + 1);
        }

        document.getElementById('status-text').innerText = "¡Mirá la secuencia!";
        await new Promise(r => setTimeout(r, 1000));
        
        for (let paso of secuencia) {
            await iluminar(paso, paso === 1 ? 'var(--color-P)' : 'var(--color-AC)');
            await new Promise(r => setTimeout(r, 400));
        }
        document.getElementById('status-text').innerText = "¡Ahora vos!";
        pasoUsuario = 0;
    }

    window.registrarSimon = async (n) => {
        if (secuencia.length === 0) return;

        await iluminar(n, n === 1 ? 'var(--color-P)' : 'var(--color-AC)');
        
        if (n === secuencia[pasoUsuario]) {
            pasoUsuario++;
            if (pasoUsuario === secuencia.length) {
                registrarProgreso(u, 'Simon', 'Completó nivel ' + dificultad);
                document.getElementById('status-text').innerText = "¡Excelente! ¿Otro más?";
                await new Promise(r => setTimeout(r, 2000));
                mostrarSecuencia(); // Reinicia la serie
            }
        } else {
            document.getElementById('status-text').innerText = "¡Casi! Vamos de nuevo.";
            pasoUsuario = 0;
            await new Promise(r => setTimeout(r, 1000));
            // Re-muestra la misma secuencia para ayudar
            for (let paso of secuencia) {
                await iluminar(paso, paso === 1 ? 'var(--color-P)' : 'var(--color-AC)');
                await new Promise(r => setTimeout(r, 400));
            }
        }
    };

    document.getElementById('btn-1').onclick = () => registrarSimon(1);
    document.getElementById('btn-2').onclick = () => registrarSimon(2);
    }
    
    // Esto asegura que al cargar la página, se ejecuten los selectores
    window.onload = function() {
        adaptarSelectores();
 };
</script>
</body>
</html>
