<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESENCIAL | Zona de Juegos</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script> <style>
        :root { --primary: #ff6b6b; --secondary: #4ecdc4; --accent: #ffe66d; }
        body { font-family: 'Nunito', sans-serif; background: #2d3436; color: white; margin: 0; padding: 20px; }
        h1, h2 { font-family: 'Fredoka One', cursive; text-align: center; }
        .view { display: none; max-width: 800px; margin: auto; }
        .active { display: block; }
        .btn-game { background: var(--secondary); border: none; padding: 20px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 10px; width: 100%; max-width: 300px; }
        .btn-game:hover { transform: scale(1.05); filter: brightness(1.2); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .p-card { background: white; color: #2d3436; padding: 10px; border-radius: 20px; cursor: pointer; text-align: center; border: 5px solid white; }
        .p-card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; }
        #pantalla-juego { text-align: center; margin-top: 20px; }
        .puzzle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 250px; margin: auto; }
        .puzzle-piece { width: 120px; height: 120px; background-size: 200% 200%; border: 2px solid white; cursor: pointer; }
        .gray { filter: grayscale(100%); transition: 0.5s; }
        .memory-card { width: 100px; height: 100px; background: var(--primary); border-radius: 15px; display: inline-block; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="view-selector" class="view active">
    <h1>🎮 ZONA DE JUEGOS</h1>
    
    <div class="controles-header" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: white; padding: 20px; border-radius: 25px;">
        <select id="sel-mod" onchange="adaptarSelectores()" style="padding:15px; border-radius:15px; font-size:1.1rem;">
            <option value="cd">Centro de Día (CD)</option>
            <option value="cet">Educativo (CET)</option>
            <option value="rehab">Rehabilitación</option>
        </select>

        <div id="container-sala">
            <select id="sel-sala" onchange="cargarDatos()" style="padding:15px; border-radius:15px; font-size:1.1rem;">
                <option value="1">Sala 1</option>
                <option value="2">Sala 2</option>
                <option value="3">Sala 3</option>
                <option value="4">Sala 4</option>
            </select>
        </div>

        <select id="sel-turno" onchange="cargarDatos()" style="padding:15px; border-radius:15px; font-size:1.1rem;"></select>
    </div>

    <div class="grid" id="grilla"></div>
    <br><button onclick="window.location.href='index.html'" class="btn-game" style="background:#636e72">⬅ Volver a Asistencia</button>
</div>

<div id="view-juego" class="view">
    <h2 id="titulo-juego">Jugando...</h2>
    <div id="pantalla-juego"></div>
    <br><button onclick="irA('selector')" class="btn-game">⬅ Cambiar de Paciente</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAugXXx_b_wKFByhDbLZslk2HA_UTzrzd8",
        authDomain: "clinicaintegral-5c488.firebaseapp.com",
        databaseURL: "https://clinicaintegral-5c488-default-rtdb.firebaseio.com",
        projectId: "clinicaintegral-5c488"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Verificamos el usuario antes de hacer nada
    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            console.log("Sesión activa para:", user.email);
            adaptarSelectores(); // Arranca el sistema
        } else {
            console.log("No hay usuario logueado.");
            document.getElementById('grilla').innerHTML = '<h2>Debes iniciar sesión en la pantalla principal. 🛑</h2>';
        }
    });

    function adaptarSelectores() {
        const mod = document.getElementById('sel-mod').value;
        const selTurno = document.getElementById('sel-turno');
        const containerSala = document.getElementById('container-sala');
        
        containerSala.style.display = (mod === 'rehab') ? 'none' : 'block';

        selTurno.innerHTML = '';
        if (mod === 'rehab') {
            ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'].forEach(d => 
                selTurno.innerHTML += `<option value="${d}">${d}</option>`);
        } else {
            selTurno.innerHTML = '<option value="Mañana">Mañana</option><option value="Tarde">Tarde</option><option value="Vespertino">Vespertino</option>';
        }
        cargarDatos();
    }
// Lógica EXACTA de tu index (con filtro de duplicados y filtro de sala/turno)
async function cargarDatos() {
    console.log("Iniciando cargarDatos..."); // 🔥 Si esto no sale en consola, el botón no llama a la función
    
    const mod = document.getElementById('sel-mod').value;
    const sala = document.getElementById('sel-sala').value;
    const turno = document.getElementById('sel-turno').value;
    
    // Ruta explícita: Vamos a probar una estructura estándar
    // Si tus datos en Firebase están en "cd/pacientes", esto debería funcionar
    let refPath = (mod === 'rehab') ? `${mod}/turnos/${turno}` : `${mod}/pacientes`;
    
    console.log("La ruta a consultar es:", refPath); // 🔥 Si esto no sale, el error está arriba

    const grid = document.getElementById('grilla');
    grid.innerHTML = '<h2>Buscando pacientes... 🕵️‍♂️</h2>';
    
    // ... resto del código ...
    
    try {
        const snap = await db.ref(refPath).once('value');
        const todos = snap.val();
        
        if(!todos) {
            grid.innerHTML = '<h2>No hay pacientes registrados aquí. 🤷‍♂️</h2>';
            return;
        }

        grid.innerHTML = '';
        let encontrados = 0;
        let procesados = {}; // El filtro anti-duplicados que funciona en tu index
        const baseFotoPath = "https://raw.githubusercontent.com/cristianmarquezcpn-web/asistencia_concurrentes/main/fotos_concurrentes/";

        for (let key in todos) {
            let nombre = (mod === 'rehab') ? todos[key] : key;
            
            // Si ya lo procesamos, no lo volvemos a poner (evita duplicados en Rehab)
            if (procesados[nombre]) continue;
            
            let p = (mod === 'rehab') ? { turno: turno } : todos[key];
            
            // Filtro de comparación exacto igual al de tu index
            const coincide = (mod === 'rehab') ? true : (String(p.sala) === sala && p.turno === turno);

            if (coincide) {
                procesados[nombre] = true;
                encontrados++;
                
                const fotoUrl = `${baseFotoPath}${encodeURIComponent(nombre)}.jpg`;
                
                // Mantenemos la estructura de la card para juegos
                grid.innerHTML += `
                    <div class="p-card" onclick="menuJuegos('${nombre}', '${fotoUrl}')">
                        <img src="${fotoUrl}" onerror="this.src='https://via.placeholder.com/110'">
                        <p>${nombre}</p>
                    </div>`;
            }
        }

        if(encontrados === 0) {
            grid.innerHTML = '<h2>No hay pacientes en esta sala/turno. 🤷‍♂️</h2>';
        }
    } catch (e) {
        console.error("Error al cargar:", e);
        grid.innerHTML = '<h2>Error de acceso. Revisa los permisos en Firebase.</h2>';
    }
}
    function menuJuegos(n, u) {
        document.getElementById('titulo-juego').innerText = "¡Juega con " + n + "!";
        document.getElementById('pantalla-juego').innerHTML = `
            <button class="btn-game" onclick="juegoAnimales('${u}')">🐶 Animales</button>
            <button class="btn-game" onclick="juegoRompecabezas('${u}')">🧩 Rompecabezas</button>
            <button class="btn-game" onclick="juegoPintar('${u}')">🎨 Pintar</button>
            <button class="btn-game" onclick="juegoMemoria()">🧠 Memoria</button>
        `;
        irA('juego');
    }

    function juegoAnimales(u) {
        document.getElementById('pantalla-juego').innerHTML = `
            <div style="position:relative; display:inline-block;">
                <img src="${u}" style="width:200px; border-radius:20px;">
                <div id="emoji" style="position:absolute; top:-40px; left:50%; transform:translateX(-50%); font-size:80px;"></div>
            </div><div id="btn-animales"></div>`;
        const anim = [['🐮','vaca'],['🐱','gato'],['🐶','perro'],['🐴','caballo'],['🦆','pato']];
        anim.forEach(a => {
            document.getElementById('btn-animales').innerHTML += `<button onclick="usarAnimal('${a[0]}','${a[1]}')" style="font-size:2rem; width:60px; height:60px; border-radius:50%; border:none; margin:5px;">${a[0]}</button>`;
        });
    }

    function usarAnimal(e, s) {
        document.getElementById('emoji').innerText = e;
        new Audio(`https://raw.githubusercontent.com/cristianmarquezcpn-web/asistencia_concurrentes/main/sonidos_animales/${s}.mp3`).play();
    }

    function juegoRompecabezas(u) {
        document.getElementById('pantalla-juego').innerHTML = `<div class="puzzle-grid" id="puzzle"></div>`;
        for(let i=0; i<4; i++) {
            document.getElementById('puzzle').innerHTML += `<div class="puzzle-piece" style="background-image:url(${u}); background-position: ${i%2==0 ? '0%' : '100%'} ${i<2 ? '0%' : '100%'}" onclick="this.style.border='4px solid var(--accent)'"></div>`;
        }
    }

    function juegoPintar(u) {
        document.getElementById('pantalla-juego').innerHTML = `<img src="${u}" class="gray" onclick="this.classList.remove('gray')" style="width:200px; border-radius:20px; cursor:pointer;">`;
    }

    function juegoMemoria() {
        document.getElementById('pantalla-juego').innerHTML = `
            <div style="display:flex; justify-content:center; gap:15px; margin-top:20px;">
                <div class="memory-card" onclick="this.style.background='white'"></div>
                <div class="memory-card" onclick="this.style.background='white'"></div>
            </div>`;
    }

    function irA(v) {
        document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
    }
</script>
</body>
</html>
