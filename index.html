<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESENCIAL | Sistema Integral</title>
    
    <!-- Fuentes amigables y Confetti para los estímulos -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <style>
        :root { 
            /* Colores estrictos de estado */
            --color-P: #27ae60;  /* Verde */
            --color-A: #e74c3c;  /* Rojo */
            --color-AC: #3498db; /* Azul */
            
            --bg: #f4f9f9; 
            --text: #2c3e50;
        }
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text); 
            padding-bottom: 50px;
        }

        .view { display: none; padding: 20px; max-width: 900px; margin: auto; animation: fadeIn 0.4s ease-out; }
        .active { display: block; }
        
        h1, h2, h3 { text-align: center; color: #2c3e50; }
        
        /* Botones Gigantes y Amigables */
        button, select, input[type="date"] { 
            font-family: 'Nunito', sans-serif;
            padding: 15px 25px; 
            border-radius: 20px; 
            border: 2px solid #ddd; 
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer; 
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        button:hover, select:hover, input:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        
        .btn-primario { background: #4285f4; color: white; border: none; font-size: 1.3rem; width: 100%; max-width: 300px;}
        .btn-exito { background: #f39c12; color: white; border: none; font-size: 1.3rem; padding: 20px; margin-top: 20px; width: 100%;}
        .btn-volver { background: #95a5a6; color: white; border: none; margin-top: 10px; }

        /* Controles de cabecera */
        .controles-header {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            background: white; padding: 20px; border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px;
        }

        /* Tarjetas de Pacientes Gigantes */
        .grid-pacientes { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
        }
        .p-card { 
            background: white; padding: 15px; border-radius: 30px; 
            border: 6px solid #eee; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }
        .p-card:active { transform: scale(0.9); }
        .p-card img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .p-card p { font-size: 1.2rem; margin: 0; font-weight: 900; }
        .p-card span { display: block; font-size: 1.5rem; margin-top: 5px; font-weight: bold; }

        /* Estados estandarizados */
        .estado-P { border-color: var(--color-P); background: #e8f8f5; color: var(--color-P); }
        .estado-A { border-color: var(--color-A); background: #fdedec; color: var(--color-A); }
        .estado-AC { border-color: var(--color-AC); background: #ebf5fb; color: var(--color-AC); }

        /* Animaciones para los estímulos */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .pop-anim { animation: pop 0.4s ease; }

        /* Toast de Estímulo */
        #toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: #ff4757; color: white; padding: 15px 30px; border-radius: 30px;
            font-size: 1.5rem; font-weight: 900; box-shadow: 0 10px 30px rgba(255,71,87,0.4);
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 1000; pointer-events: none;
        }
        .toast-show { bottom: 40px !important; }

        /* Modal Resumen */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); z-index: 999; }
        .modal-box { background: white; padding: 40px; border-radius: 35px; width: 90%; max-width: 500px; text-align: center; }
        .modal-box table { width: 100%; font-size: 1.2rem; margin-bottom: 20px; }
        .modal-box th { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .modal-box td { padding: 10px 0; font-weight: bold; }

    </style>
</head>
<body>

<!-- Toast para Estímulos Positivos -->
<div id="toast">¡Bien hecho! 🌟</div>

<!-- PANTALLA 1: LOGIN -->
<div id="view-login" class="view active" style="text-align: center; margin-top: 10vh;">
    <h1 style="font-size: 3rem; color: var(--color-P);">ESENCIAL ✨</h1>
    <p style="font-size: 1.5rem;">Tu portal mágico de asistencia</p>
    <br><br>
    <button class="btn-primario" onclick="login()">🔑 Entrar con Google</button>
</div>

<!-- PANTALLA 2: INICIO -->
<div id="view-home" class="view">
    <header style="display:flex; justify-content:space-between; align-items: center;">
        <h2>¡Hola! 👋</h2>
        <button class="btn-volver" onclick="firebase.auth().signOut()">Salir</button>
    </header>
    <div style="display: grid; gap: 20px; margin-top: 30px;">
        <div class="p-card" onclick="irA('asistencia')" style="background: #fff3e0; border-color: #ff9800;">
            <h1 style="font-size: 3rem; margin: 10px;">📋</h1>
            <h2>Tomar Asistencia</h2>
            <p>¡Vamos a ver quién vino hoy!</p>
        </div>
    </div>
</div>

<!-- PANTALLA 3: ASISTENCIA -->
<div id="view-asistencia" class="view">
    
    <div class="controles-header">
        <input type="date" id="fecha-selector" onchange="cargarDatos()">
        
        <select id="sel-mod" onchange="actualizarTurnos()">
            <option value="cd">Centro de Día (CD)</option>
            <option value="cet">Educativo (CET)</option>
            <option value="rehab">Rehabilitación</option>
        </select>

        <select id="sel-turno" onchange="cargarDatos()"></select>
    </div>

    <h2 id="mensaje-cargando">Toca a un paciente para cambiar su estado 👇</h2>
    
    <div class="grid-pacientes" id="grilla"></div>
    
    <button class="btn-exito" onclick="verificar()">✨ ¡LISTO! GUARDAR ✨</button>
    <button class="btn-volver" style="width: 100%; padding: 15px;" onclick="irA('home')">⬅ Volver</button>
</div>

<!-- MODAL DE CONFIRMACIÓN -->
<div id="modal" class="modal">
    <div class="modal-box">
        <h2 style="font-size: 2rem;">¡Casi terminamos! 🚀</h2>
        <p>Revisa que todo esté correcto:</p>
        <table id="tabla-ver"></table>
        <button class="btn-primario" style="background: var(--color-P); padding: 20px; border-radius: 25px;" onclick="guardar()">✔️ CONFIRMAR GUARDADO</button>
        <button class="btn-volver" style="width: 100%; border-radius: 25px;" onclick="document.getElementById('modal').style.display='none'">❌ Espera, me equivoqué</button>
    </div>
</div>

<script>
    // Configuración Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAugXXx_b_wKFByhDbLZslk2HA_UTzrzd8",
        authDomain: "clinicaintegral-5c488.firebaseapp.com", /* <-- ¡ESTA LÍNEA FALTABA! */
        databaseURL: "https://clinicaintegral-5c488-default-rtdb.firebaseio.com",
        projectId: "clinicaintegral-5c488"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Estado global de la aplicación
    let state = { pacientes: {} };

    // Estímulos Positivos Aleatorios
    const frasesMotivadoras = ["¡Excelente! 🌟", "¡Muy bien! 👏", "¡Genial! ✨", "¡Súper! 🚀", "¡Buenísimo! 🎉", "¡Perfecto! 💖"];
    const coloresEstimulo = ["#ff4757", "#2ed573", "#1e90ff", "#ffa502"];

    function mostrarEstimulo() {
        const toast = document.getElementById('toast');
        const frase = frasesMotivadoras[Math.floor(Math.random() * frasesMotivadoras.length)];
        const color = coloresEstimulo[Math.floor(Math.random() * coloresEstimulo.length)];
        
        toast.innerText = frase;
        toast.style.background = color;
        toast.classList.add('toast-show');
        
        setTimeout(() => toast.classList.remove('toast-show'), 1500);
    }

    // Navegación
    function irA(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        
        if(v === 'asistencia') {
            document.getElementById('fecha-selector').valueAsDate = new Date();
            actualizarTurnos();
        }
    }

    // Autenticación (con Redirect para evitar bloqueos)
    // Nueva función de login con Popup
function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
        .then((result) => {
            if (result.user) {
                // Si el inicio de sesión es exitoso, entra a la app
                irA('home');
            }
        }).catch((error) => {
            console.error("Error de autenticación:", error);
            alert("Error: " + error.message);
        });
}

    
    // Lógica de Selectores Dinámicos
    function actualizarTurnos() {
        const mod = document.getElementById('sel-mod').value;
        const selTurno = document.getElementById('sel-turno');
        selTurno.innerHTML = '';
        
        const opciones = (mod === 'rehab') ? ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'] : ['Mañana', 'Tarde'];
        
        opciones.forEach(op => {
            selTurno.innerHTML += `<option value="${op.toLowerCase()}">${op}</option>`;
        });
        
        cargarDatos();
    }

    // Lógica de Carga y Viaje en el Tiempo
    async function cargarDatos() {
        const mod = document.getElementById('sel-mod').value;
        const sub = document.getElementById('sel-turno').value;
        const fecha = document.getElementById('fecha-selector').value;

        if(!mod || !sub || !fecha) return;

        const path = (mod === 'rehab') ? `rehab/turnos/${sub}/pacientes` : `${mod}/pacientes`;
        const grid = document.getElementById('grilla');
        grid.innerHTML = '<h2 style="grid-column: 1 / -1;">Buscando información... 🕵️‍♂️</h2>';
        state.pacientes = {};

        // 1. Buscamos quiénes pertenecen a este turno/modalidad
        const snap = await db.ref(path).once('value');
        const data = snap.val();
        
        if(!data) {
            grid.innerHTML = '<h2 style="grid-column: 1 / -1;">No hay pacientes aquí 🤷‍♂️</h2>';
            return;
        }

        grid.innerHTML = '';

        // 2. Por cada paciente, buscamos si YA tiene historial guardado en esa fecha
        const promesas = Object.keys(data).map(async (n) => {
            // Aquí la IA tiene la ruta perfecta
            const histSnap = await db.ref(`seguimiento_pacientes/${n}/historial/${fecha}`).once('value');
            return { nombre: n, estado: histSnap.val() || 'A' }; // Por defecto Ausente
        });

        const resultados = await Promise.all(promesas);

        // 3. Dibujamos las tarjetas en pantalla
        resultados.forEach(p => {
            state.pacientes[p.nombre] = p.estado;
            const emoji = p.estado === 'P' ? '✔️' : (p.estado === 'A' ? '❌' : '🔵');
            
            grid.innerHTML += `
                <div class="p-card estado-${p.estado}" id="c-${p.nombre.replace(/\s/g,'_')}" onclick="toggle('${p.nombre}')">
                    <img src="https://raw.githubusercontent.com/cristianmarquezcpn-web/asistencia_concurrentes/main/fotos_concurrentes/${encodeURIComponent(p.nombre)}.jpg" onerror="this.src='https://via.placeholder.com/100'">
                    <p>${p.nombre}</p>
                    <span id="lbl-${p.nombre.replace(/\s/g,'_')}">${emoji} ${p.estado}</span>
                </div>`;
        });
    }

    // Lógica de Toque (Rotar estados)
    function toggle(n) {
        let el = document.getElementById(`c-${n.replace(/\s/g,'_')}`);
        let lbl = document.getElementById(`lbl-${n.replace(/\s/g,'_')}`);
        
        // Efecto visual pop
        el.classList.remove('pop-anim');
        void el.offsetWidth; // Forzar reinicio de animación
        el.classList.add('pop-anim');
        mostrarEstimulo();

        // Rotamos: A -> P -> AC -> A
        if (state.pacientes[n] === 'A') {
            state.pacientes[n] = 'P';
            lbl.innerText = '✔️ P';
        } else if (state.pacientes[n] === 'P') {
            state.pacientes[n] = 'AC';
            lbl.innerText = '🔵 AC';
        } else {
            state.pacientes[n] = 'A';
            lbl.innerText = '❌ A';
        }
        
        el.className = `p-card estado-${state.pacientes[n]} pop-anim`;
    }

    // Resumen antes de guardar
    function verificar() {
        document.getElementById('modal').style.display = 'flex';
        let t = document.getElementById('tabla-ver');
        t.innerHTML = '';
        
        for(let n in state.pacientes) {
            let color = state.pacientes[n] === 'P' ? 'var(--color-P)' : (state.pacientes[n] === 'A' ? 'var(--color-A)' : 'var(--color-AC)');
            let emoji = state.pacientes[n] === 'P' ? '✔️' : (state.pacientes[n] === 'A' ? '❌' : '🔵');
            
            t.innerHTML += `<tr>
                <td>${n}</td>
                <td style="color: ${color}; font-size: 1.5rem;">${emoji} ${state.pacientes[n]}</td>
            </tr>`;
        }
    }

    // Guardado Final optimizado para la IA y Celebración
    function guardar() {
        const fecha = document.getElementById('fecha-selector').value;
        const mod = document.getElementById('sel-mod').value;
        const sub = document.getElementById('sel-turno').value;
        const updates = {};
        
        for(let n in state.pacientes) {
            // Guarda el historial para la IA
            updates[`seguimiento_pacientes/${n}/historial/${fecha}`] = state.pacientes[n];
            // Guarda la configuración actual del paciente
            updates[`seguimiento_pacientes/${n}/config`] = { modalidad: mod, turno: sub };
        }
        
        db.ref().update(updates).then(() => { 
            document.getElementById('modal').style.display = 'none'; 
            
            // ¡MAGIA! Disparamos confeti por toda la pantalla
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#27ae60', '#3498db', '#f39c12', '#e74c3c']
            });
            
            setTimeout(() => {
                alert("¡Trabajo espectacular! Todo guardado correctamente. 🚀");
            }, 500);
        });
    }
</script>
</body>
</html>
