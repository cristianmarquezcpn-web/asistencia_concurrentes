<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESENCIAL | Sistema Integral</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --danger: #e74c3c; --accent: #2980b9; --bg: #f0f2f5; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; color: #2c3e50; }
        .view { display: none; padding: 20px; max-width: 900px; margin: auto; animation: fade 0.3s; }
        .active { display: block; }
        
        /* Dashboard Cards */
        .grid-dash { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 40px; }
        .card-dash { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; text-align: center; }
        .card-dash:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        /* Asistencia */
        .grid-pacientes { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .p-card { background: white; padding: 10px; border-radius: 20px; border: 4px solid #eee; cursor: pointer; transition: 0.2s; }
        .p-card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; }
        .estado-P { border-color: var(--success); background: #e8f5e9; }
        .estado-A { border-color: var(--danger); background: #ffebee; }
        .estado-AC { border-color: var(--accent); background: #e3f2fd; }

        /* Modal */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; }
        
        button { padding: 12px 25px; border-radius: 12px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="view-login" class="view active" style="text-align: center; margin-top: 100px;">
    <h1>ESENCIAL</h1>
    <p>Portal Clínico Profesional</p>
    <button onclick="login()" style="background: #4285f4;">Ingresar con Google</button>
</div>

<div id="view-home" class="view">
    <header style="display:flex; justify-content:space-between;">
        <h2>Bienvenido, Orientadora</h2>
        <button onclick="firebase.auth().signOut()">Salir</button>
    </header>
    <div class="grid-dash">
        <div class="card-dash" onclick="irA('asistencia')"><h2>📋 Asistencia</h2><p>Registro diario de concurrentes</p></div>
        <div class="card-dash" onclick="irA('juegos')"><h2>🎮 Juegos</h2><p>Estimulación cognitiva</p></div>
    </div>
</div>

<div id="view-asistencia" class="view">
    <header>
        <h2 id="titulo-sala">Asistencia</h2>
        <input type="date" id="fecha-selector">
    </header>
    <div class="grid-pacientes" id="grilla"></div>
    <div style="margin-top:30px;">
        <button onclick="verificar()">FINALIZAR Y VERIFICAR</button>
        <button onclick="irA('home')" style="background:#7f8c8d;">VOLVER</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3>Resumen de Asistencia</h3>
        <table id="tabla-ver" style="width:100%; text-align:left;"></table>
        <br>
        <button onclick="guardar()">CONFIRMAR GUARDADO</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="background:#7f8c8d;">CANCELAR</button>
    </div>
</div>

<div id="view-juegos" class="view">
    <h2>Zona de Juegos</h2>
    <p>Aquí cargarás tus actividades.</p>
    <button onclick="irA('home')">VOLVER</button>
</div>

<script>
    // Configuración Firebase (Usando tus datos)
    const firebaseConfig = {
        apiKey: "AIzaSyAugXXx_b_wKFByhDbLZslk2HA_UTzrzd8",
        databaseURL: "https://clinicaintegral-5c488-default-rtdb.firebaseio.com",
        projectId: "clinicaintegral-5c488"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Navegación
    function irA(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        if(v === 'asistencia') configurarSesion();
    }

    // Auth
    function login() {
        firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(() => irA('home'));
    }

    // Lógica Asistencia
    let state = { mod:'', sub:'', sala:'', pacientes:{} };

    function configurarSesion() {
        state.mod = prompt("Modalidad (cd/cet/rehab):");
        state.sub = (state.mod === 'rehab') ? prompt("Día:") : prompt("Turno:");
        if(state.mod !== 'rehab') state.sala = prompt("Sala:");
        document.getElementById('fecha-selector').valueAsDate = new Date();
        cargarDatos();
    }

    function cargarDatos() {
        const path = (state.mod === 'rehab') ? `rehab/turnos/${state.sub}/pacientes` : `${state.mod}/pacientes`;
        document.getElementById('titulo-sala').innerText = `${state.mod.toUpperCase()} | ${state.sub}`;
        db.ref(path).once('value', snap => {
            const data = snap.val();
            const grid = document.getElementById('grilla');
            grid.innerHTML = '';
            for(let n in data) {
                if(state.mod !== 'rehab' && (String(data[n].sala) !== String(state.sala) || String(data[n].turno) !== String(state.sub))) continue;
                state.pacientes[n] = 'A';
                grid.innerHTML += `<div class="p-card estado-A" id="c-${n.replace(/\s/g,'_')}" onclick="toggle('${n}')">
                    <img src="https://raw.githubusercontent.com/cristianmarquezcpn-web/asistencia_concurrentes/main/fotos_concurrentes/${encodeURIComponent(n)}.jpg" onerror="this.src='https://via.placeholder.com/100'">
                    <p><strong>${n}</strong></p></div>`;
            }
        });
    }

    function toggle(n) {
        let el = document.getElementById(`c-${n.replace(/\s/g,'_')}`);
        state.pacientes[n] = (state.pacientes[n] === 'A') ? 'P' : (state.pacientes[n] === 'P') ? 'AC' : 'A';
        el.className = `p-card estado-${state.pacientes[n]}`;
    }

    function verificar() {
        document.getElementById('modal').style.display = 'flex';
        let t = document.getElementById('tabla-ver');
        t.innerHTML = '<tr><th>Nombre</th><th>Estado</th></tr>';
        for(let n in state.pacientes) t.innerHTML += `<tr><td>${n}</td><td>${state.pacientes[n]}</td></tr>`;
    }

    function guardar() {
        const f = document.getElementById('fecha-selector').value;
        const updates = {};
        for(let n in state.pacientes) updates[`asistencias/${f}/${state.mod}/${state.sub}/${state.sala || ''}/${n}`] = state.pacientes[n];
        db.ref().update(updates).then(() => { alert("Guardado"); document.getElementById('modal').style.display = 'none'; });
    }
</script>
</body>
</html>
