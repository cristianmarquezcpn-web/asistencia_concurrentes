<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ESENCIAL | Sistema Integral</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        :root { --P: #27ae60; --A: #c0392b; --AC: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .app-view { display: none; max-width: 900px; margin: auto; }
        .active { display: block; }
        .card-menu { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 15px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: white; padding: 10px; border-radius: 20px; border: 4px solid #ddd; cursor: pointer; }
        .card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; }
        .estado-P { border-color: var(--P); background: #e8f5e9; }
        .estado-A { border-color: var(--A); background: #ffebee; }
        .estado-AC { border-color: var(--AC); background: #e3f2fd; }
        .modal { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; }
        button { padding: 15px; border-radius: 10px; border: none; background: #34495e; color: white; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<div id="view-login" class="app-view active">
    <h1>ESENCIAL</h1>
    <button class="card-menu" onclick="loginGoogle()">Ingresar con Google</button>
</div>

<div id="view-home" class="app-view">
    <h1>Portal Principal</h1>
    <div class="card-menu" onclick="irA('asistencia')"><h2>📋 Asistencia</h2></div>
    <div class="card-menu" onclick="irA('juegos')"><h2>🎮 Juegos</h2></div>
</div>

<div id="view-asistencia" class="app-view">
    <header>
        <h2 id="titulo-sala">Cargando...</h2>
        <input type="date" id="fecha-selector">
    </header>
    <div class="grid" id="grilla"></div>
    <button onclick="abrirVerificacion()">FINALIZAR Y VERIFICAR</button>
    <button onclick="irA('home')" style="background:gray;">VOLVER</button>
</div>

<div id="modal-ver" class="modal">
    <div class="modal-content">
        <h3>Verificación de Orientadora</h3>
        <table id="tabla-ver" style="width:100%; text-align:left;"></table>
        <button onclick="guardarFirebase()">CONFIRMAR GUARDADO</button>
        <button onclick="document.getElementById('modal-ver').style.display='none'" style="background:gray;">CERRAR</button>
    </div>
</div>

<div id="view-juegos" class="app-view">
    <h1>Zona de Juegos</h1>
    <button onclick="irA('home')" style="background:gray;">VOLVER</button>
</div>

<script>
    // 1. CONFIGURACIÓN (RECUERDA PEGAR TUS DATOS AQUÍ)
    const firebaseConfig = {
        apiKey: "AIzaSyAugXXx_b_wKFByhDbLZslk2HA_UTzrzd8",
        databaseURL: "https://clinicaintegral-5c488-default-rtdb.firebaseio.com",
        projectId: "clinicaintegral-5c488"
    };
    firebase.initializeApp(firebaseConfig);

    // 2. NAVEGACIÓN
    function irA(vista) {
        document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + vista).classList.add('active');
        if(vista === 'asistencia') configurarSesion();
    }

    function loginGoogle() {
        firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(() => irA('home'));
    }

    // 3. LÓGICA DE ASISTENCIA
    let state = { mod: '', sub: '', sala: '', pacientes: {} };

    function configurarSesion() {
        state.mod = prompt("Modalidad (cd/cet/rehab):");
        state.sub = (state.mod === 'rehab') ? prompt("Día:") : prompt("Turno:");
        if(state.mod !== 'rehab') state.sala = prompt("Sala:");
        document.getElementById('fecha-selector').valueAsDate = new Date();
        cargarDatos();
    }

    function cargarDatos() {
        const path = (state.mod === 'rehab') ? `rehab/turnos/${state.sub}/pacientes` : `${state.mod}/pacientes`;
        document.getElementById('titulo-sala').innerText = `${state.mod.toUpperCase()} | ${state.sub}`;
        
        firebase.database().ref(path).once('value', snap => {
            const data = snap.val();
            const grid = document.getElementById('grilla');
            grid.innerHTML = '';
            for(let n in data) {
                if(state.mod !== 'rehab' && (String(data[n].sala) !== String(state.sala) || String(data[n].turno) !== String(state.sub))) continue;
                state.pacientes[n] = 'A';
                grid.innerHTML += `<div class="card estado-A" id="card-${n.replace(/\s/g,'_')}" onclick="toggle('${n}')">
                    <img src="https://raw.githubusercontent.com/cristianmarquezcpn-web/asistencia_concurrentes/main/fotos_concurrentes/${encodeURIComponent(n)}.jpg" onerror="this.src='https://via.placeholder.com/100'">
                    <p>${n}</p></div>`;
            }
        });
    }

    function toggle(n) {
        let cur = state.pacientes[n];
        cur = (cur === 'A') ? 'P' : (cur === 'P') ? 'AC' : 'A';
        state.pacientes[n] = cur;
        document.getElementById(`card-${n.replace(/\s/g,'_')}`).className = `card estado-${cur}`;
    }

    function abrirVerificacion() {
        document.getElementById('modal-ver').style.display='flex';
        let tabla = document.getElementById('tabla-ver');
        tabla.innerHTML = '<tr><th>Nombre</th><th>Estado</th></tr>';
        for(let n in state.pacientes) tabla.innerHTML += `<tr><td>${n}</td><td>${state.pacientes[n]}</td></tr>`;
    }

    function guardarFirebase() {
        const fecha = document.getElementById('fecha-selector').value;
        const updates = {};
        for(let n in state.pacientes) updates[`asistencias/${fecha}/${state.mod}/${state.sub}/${state.sala || ''}/${n}`] = state.pacientes[n];
        firebase.database().ref().update(updates).then(() => { alert("Guardado"); document.getElementById('modal-ver').style.display='none'; });
    }
</script>
</body>
</html>
