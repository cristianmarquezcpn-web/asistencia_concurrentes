<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistencia - ESENCIAL SRL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; padding: 20px; text-align: center; }
        .pantalla-inicio { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .grupo-botones { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .btn-selector { background: #34495e; color: white; border: none; padding: 15px 25px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .btn-selector.activo { background: #1a2a6c; }

        /* Estímulos Visuales */
        .grilla-chicos { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; padding: 20px; }
        .tarjeta-chico { background: white; padding: 20px; border-radius: 20px; cursor: pointer; border: 4px solid #ddd; transition: 0.3s; }
        .tarjeta-chico img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }
        
        .estado-P { border-color: green; background: #e8f5e9; }
        .estado-A { border-color: red; background: #ffebee; }
        .estado-AC { border-color: blue; background: #e3f2fd; }

        @keyframes tocarEfecto { 0% { transform: scale(1); } 50% { transform: scale(1.15); box-shadow: 0 0 20px rgba(0,0,0,0.2); } 100% { transform: scale(1); } }
        .animar-toque { animation: tocarEfecto 0.4s ease-out; }

        .panel-supervisora { background: white; margin: 40px auto; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 800px; }
        .tabla-control { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .tabla-control th, .tabla-control td { padding: 12px; border-bottom: 1px solid #ddd; }
        .btn-guardar { background: #27ae60; color: white; padding: 15px 40px; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div class="pantalla-inicio" id="bloque-filtros">
        <h2>Seleccione Modalidad</h2>
        <div class="grupo-botones">
            <button class="btn-selector" onclick="iniciarCarga('CD', this)">C.D.</button>
            <button class="btn-selector" onclick="iniciarCarga('CET_MANANA', this)">CET Mañana</button>
            <button class="btn-selector" onclick="iniciarCarga('CET_TARDE', this)">CET Tarde</button>
            <button class="btn-selector" onclick="iniciarCarga('REHAB', this)">Rehabilitación</button>
        </div>
    </div>

    <div id="zona-asistencia" style="display:none;">
        <h1 id="titulo-sala"></h1>
        <div class="grilla-chicos" id="grilla"></div>

        <div class="panel-supervisora">
            <h3>📋 Panel de Control de Orientadora</h3>
            <select id="novedad-dia" style="padding: 10px; width: 100%;">
                <option value="Normal">Normal</option>
                <option value="Sin Actividad">Sin Actividad</option>
                <option value="Excursión">Excursión</option>
                <option value="Feriado">Feriado/Suspensión</option>
            </select>
            <table class="tabla-control"><tbody id="tabla-body"></tbody></table>
            <button class="btn-guardar" onclick="guardarFirebase()">GUARDAR ASISTENCIA</button>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAugXXx_b_wKFByhDbLZslk2HA_UTzrzd8", databaseURL: "https://clinicaintegral-5c488-default-rtdb.firebaseio.com", projectId: "clinicaintegral-5c488" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let modActual = "";
    let listaPacientes = {};

    function iniciarCarga(mod, btn) {
        modActual = mod;
        document.getElementById('zona-asistencia').style.display = 'block';
        document.getElementById('titulo-sala').innerText = mod;
        
        db.ref(`${mod}/pacientes`).once('value', snapshot => {
            const data = snapshot.val();
            const grilla = document.getElementById('grilla');
            grilla.innerHTML = "";
            listaPacientes = {};

            for (let nombre in data) {
                listaPacientes[nombre] = { estado: 'A' };
                const urlFoto = `https://raw.githubusercontent.com/cristianmarquezcpn-web/asistencia_concurrentes/main/fotos_concurrentes/${encodeURIComponent(nombre)}.jpg`;
                
                grilla.innerHTML += `
                    <div class="tarjeta-chico estado-A" id="card-${nombre}" onclick="toggle('${nombre}')">
                        <img src="${urlFoto}" onerror="this.src='https://via.placeholder.com/120'">
                        <h3>${nombre}</h3>
                    </div>
                `;
            }
            renderTabla();
        });
    }

    function toggle(id) {
        // Estímulos
        const card = document.getElementById(`card-${id}`);
        card.classList.remove('animar-toque');
        void card.offsetWidth; 
        card.classList.add('animar-toque');
        
        if (navigator.vibrate) navigator.vibrate(100);
        reproducirSonido();

        // Lógica
        let nuevo = (listaPacientes[id].estado === 'P') ? 'A' : 'P';
        actualizarEstado(id, nuevo);
    }

    function reproducirSonido() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function actualizarEstado(id, nuevo) {
        listaPacientes[id].estado = nuevo;
        const card = document.getElementById(`card-${id}`);
        card.className = `tarjeta-chico estado-${nuevo}`;
        renderTabla();
    }

    function renderTabla() {
        const body = document.getElementById('tabla-body');
        body.innerHTML = "";
        for (let id in listaPacientes) {
            let est = listaPacientes[id].estado;
            body.innerHTML += `<tr><td>${id}</td>
                <td><select onchange="actualizarEstado('${id}', this.value)">
                    <option value="P" ${est==='P'?'selected':''}>Presente (P)</option>
                    <option value="A" ${est==='A'?'selected':''}>Ausente (A)</option>
                    <option value="AC" ${est==='AC'?'selected':''}>Ausente c/Cert (AC)</option>
                </select></td></tr>`;
        }
    }

    function guardarFirebase() {
        const fecha = new Date().toISOString().slice(0,10);
        const updates = {};
        for (let id in listaPacientes) {
            updates[`SISTEMA_PACIENTES/asistencia/${fecha}/${modActual}/${id}`] = { 
                estado: listaPacientes[id].estado, 
                novedad: document.getElementById('novedad-dia').value 
            };
        }
        db.ref().update(updates).then(() => alert("¡Datos sincronizados!"));
    }
</script>
</body>
</html>
